<div class="model-card">
  <div class="card-header">
    <div class="card-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="8" y1="13" x2="16" y2="13"/>
        <line x1="8" y1="17" x2="12" y2="17"/>
      </svg>
    </div>
    <div class="card-badge" [class]="model.type">
      {{ getTypeLabel(model.type) }}
    </div>
  </div>

  <div class="card-body">
    <h3 class="card-title">{{ model.name }}</h3>
    <div class="card-meta">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12,6 12,12 16,14"/>
      </svg>
      <span>Modifié le {{ model.updatedAt }}</span>
    </div>
  </div>

  <div class="card-actions">
    <button
      class="action-btn view-btn"
      (click)="onView()"
      [disabled]="!canView"
      [title]="canView ? 'Consulter le modèle' : 'Permission VOIR_DES_MODELES requise'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span>Consulter</span>
    </button>

    <button
      class="action-btn edit-btn"
      (click)="onEdit()"
      [disabled]="!canEdit"
      [title]="canEdit ? 'Modifier le contenu du modèle' : 'Permission MODIFIER_DES_MODELES requise'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <span>Modifier</span>
    </button>

    <button
      class="action-btn rename-btn"
      (click)="onRename()"
      title="Renommer le modèle">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 7h16M4 12h10M4 17h7"/>
      </svg>
      <span>Renommer</span>
    </button>

    <button
      class="action-btn delete-btn"
      (click)="onDelete()"
      [disabled]="!canDelete"
      [title]="canDelete ? 'Supprimer le modèle' : 'Permission SUPPRIMER_DES_MODELES requise'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3,6 5,6 21,6"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
      </svg>
      <span>Supprimer</span>
    </button>
  </div>
</div>
