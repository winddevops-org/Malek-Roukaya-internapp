name: Wind App CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  ci:
    uses: khaoulahamza/devops-templates/.github/workflows/deploy.yml@main
    with:
      registry_url: "192.168.1.82:8082"   # à remplacer par l'IP réelle de votre VM
    secrets:
      NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
